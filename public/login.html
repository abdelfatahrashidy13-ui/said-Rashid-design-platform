<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول - SAIDRASHIDY AI</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f0f12;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
    .box{width:100%;max-width:420px;background:#18181d;border:1px solid #2f2f3a;border-radius:16px;padding:24px}
    h1{margin:0 0 8px;font-size:26px}.gold{color:#f5c842}.muted{color:#aaa;font-size:14px;margin-bottom:18px}
    input,button{width:100%;padding:12px;border-radius:10px;border:1px solid #2f2f3a;background:#202028;color:#fff;margin-top:10px;box-sizing:border-box}
    input:focus{outline:none;border-color:#f5c842}
    button{cursor:pointer;font-weight:700}
    .primary{background:#f5c842;color:#000;border:none}
    .secondary{background:#3b82f6;border:none}
    .msg{margin-top:12px;padding:10px;border-radius:10px;font-size:14px;display:none}
    .msg.show{display:block}.err{background:rgba(239,68,68,.1);color:#fca5a5}.ok{background:rgba(34,197,94,.1);color:#86efac}
  </style>
</head>
<body>
  <div class="box">
    <h1>SAIDRASHIDY <span class="gold">AI</span></h1>
    <div class="muted">سجل دخولك أو أنشئ حساب جديد</div>
    <input id="email" type="email" placeholder="البريد الإلكتروني" />
    <input id="password" type="password" placeholder="كلمة المرور" />
    <button class="primary" id="loginBtn">تسجيل الدخول</button>
    <button class="secondary" id="signupBtn">إنشاء حساب</button>
    <button class="secondary" id="googleBtn">المتابعة باستخدام Google</button>
    <div id="msg" class="msg"></div>
  </div>

  <script>
    const ref = new URLSearchParams(window.location.search).get("ref");
    if (ref) localStorage.setItem("referral_code", ref);
  </script>

  <script src="/config.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL;
    const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY;
    const msg = document.getElementById('msg');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');

    function showMsg(text, ok=false){ msg.className='msg show ' + (ok?'ok':'err'); msg.textContent=text; }
    function disableButtons(disabled) {
      [loginBtn, signupBtn, document.getElementById('googleBtn')].forEach(btn => btn.disabled = disabled);
    }

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY || SUPABASE_URL.includes('PUT_YOUR') || SUPABASE_ANON_KEY.includes('PUT_YOUR')) {
      showMsg('أضف بيانات Supabase داخل public/config.js أولًا.');
      disableButtons(true);
      throw new Error('Missing Supabase config');
    }

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function applyReferralToCurrentUser() {
      const { data: { user } } = await supabase.auth.getUser();
      const referralCode = localStorage.getItem('referral_code');
      if (!user || !referralCode) return;
      await supabase.from('profiles').update({ referred_by: referralCode }).eq('id', user.id).is('referred_by', null);
    }

    async function handleOAuthReturn() {
      const hash = new URLSearchParams(window.location.hash.slice(1));
      const query = new URLSearchParams(window.location.search);
      const hasOAuthData = hash.get('access_token') || query.get('code') || query.get('auth') === 'callback';
      if (!hasOAuthData) return;
      showMsg('جارٍ إتمام تسجيل الدخول عبر Google...', true);
      const { error } = await supabase.auth.exchangeCodeForSession(window.location.href);
      if (error && !String(error.message || '').toLowerCase().includes('auth code and code verifier')) {
        showMsg(error.message || 'فشل تسجيل الدخول بجوجل');
        return;
      }
      await applyReferralToCurrentUser();
      history.replaceState({}, document.title, '/login');
      window.location.href = '/dashboard';
    }

    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) return showMsg('املأ كل الحقول');
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return showMsg(error.message);
      window.location.href = '/dashboard';
    };

    document.getElementById('signupBtn').onclick = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) return showMsg('املأ كل الحقول');
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) return showMsg(error.message);
      const referralCode = localStorage.getItem('referral_code');
      if (referralCode && data?.user) {
        await supabase.from('profiles').update({ referred_by: referralCode }).eq('id', data.user.id).is('referred_by', null);
      }
      showMsg('تم إنشاء الحساب. افحص البريد لو التفعيل مطلوب.', true);
    };

    document.getElementById('googleBtn').onclick = async () => {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: `${window.location.origin}/login?auth=callback`,
          queryParams: { prompt: 'select_account' }
        }
      });
      if (error) showMsg(error.message || 'تعذر بدء تسجيل الدخول بجوجل');
    };

    handleOAuthReturn();
  </script>
</body>
</html>
