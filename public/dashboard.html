<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - SAIDRASHIDY AI</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f0f12;color:#fff;margin:0;padding:24px}
    .wrap{max-width:1100px;margin:0 auto}
    .card{background:#18181d;border:1px solid #2f2f3a;border-radius:16px;padding:20px;margin-bottom:16px}
    .gold{color:#f5c842}.muted{color:#aaa}
    button{padding:12px 16px;border:none;border-radius:10px;cursor:pointer;font-weight:700}
    .primary{background:#f5c842;color:#000}.danger{background:#ef4444;color:#fff}.blue{background:#3b82f6;color:#fff}
    textarea,input{width:100%;min-height:48px;background:#202028;border:1px solid #2f2f3a;color:#fff;border-radius:10px;padding:12px;box-sizing:border-box}
    textarea{min-height:110px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .metric{background:#202028;border:1px solid #2f2f3a;border-radius:12px;padding:14px}
    .out{background:#202028;border:1px solid #2f2f3a;border-radius:12px;padding:12px;margin-top:12px;word-break:break-word}
    .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
    .gallery img,.gallery video{width:100%;border-radius:12px;background:#202028}
    .template-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .template-card{background:#202028;border:1px solid #2f2f3a;border-radius:14px;padding:14px;cursor:pointer}
    .template-card:hover{border-color:#f5c842}
    .popup{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:999}
    .popup.show{display:flex}
    .popup-box{background:#111;border:1px solid #333;border-radius:16px;padding:24px;max-width:340px;text-align:center}
    @media(max-width:900px){.grid,.template-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:560px){.grid,.template-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>لوحة التحكم <span class="gold">SAIDRASHIDY AI</span></h1>
      <div class="grid">
        <div class="metric"><div class="muted">المستخدم</div><strong id="email">...</strong></div>
        <div class="metric"><div class="muted">الخطة</div><strong id="plan">free</strong></div>
        <div class="metric"><div class="muted">الرصيد</div><strong id="credits">0</strong></div>
        <div class="metric"><div class="muted">كود الدعوة</div><strong id="refCode">-</strong></div>
      </div>
      <div class="row" style="margin-top:12px">
        <button class="danger" id="logoutBtn">تسجيل الخروج</button>
        <button class="blue" onclick="location.href='/explore'">Explore</button>
        <button class="primary" onclick="location.href='/'">العودة للرئيسية</button>
      </div>
    </div>

    <div class="card">
      <h2>Templates</h2>
      <div class="template-grid" id="templateGrid"></div>
    </div>

    <div class="card">
      <h2>توليد AI</h2>
      <textarea id="prompt" placeholder="اكتب وصف الصورة أو الفيديو"></textarea>
      <div class="row" style="margin-top:10px">
        <button class="primary" id="enhanceBtn">تحسين البرومبت</button>
        <button class="primary" id="imageBtn">توليد صورة</button>
        <button class="primary" id="videoBtn">Image to Video</button>
      </div>
      <div class="out" id="output">لا يوجد ناتج بعد</div>
    </div>

    <div class="card">
      <h2>نظام الدعوات</h2>
      <input id="refLink" readonly>
      <div class="row" style="margin-top:10px">
        <button class="primary" id="copyRefBtn">نسخ رابط الدعوة</button>
      </div>
    </div>

    <div class="card">
      <h2>آخر أعمالك</h2>
      <div class="gallery" id="myGallery"></div>
    </div>
  </div>

  <div id="upgradePopup" class="popup">
    <div class="popup-box">
      <h2>هذه الميزة مدفوعة</h2>
      <p>اشترك في Pro للحصول على فيديوهات AI وميزات متقدمة.</p>
      <button class="primary" onclick="location.href='/'">شاهد الباقات</button>
      <button style="margin-top:8px" onclick="document.getElementById('upgradePopup').classList.remove('show')">إغلاق</button>
    </div>
  </div>

  <script src="/config.js"></script>
<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL;
    const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY;
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
if (!window.APP_CONFIG?.SUPABASE_URL || !window.APP_CONFIG?.SUPABASE_ANON_KEY || window.APP_CONFIG.SUPABASE_URL.includes('PUT_YOUR') || window.APP_CONFIG.SUPABASE_ANON_KEY.includes('PUT_YOUR')) { throw new Error('Missing Supabase config in /public/config.js'); }

    let currentUser = null, currentProfile = null, latestImageUrl = null, poll = null;
    const TEMPLATES = [
      { name: "إعلان TikTok", prompt: "A viral TikTok style product ad, fast cuts, cinematic lighting, trendy social media aesthetic, bold product reveal, 9:16" },
      { name: "إعلان عطر فاخر", prompt: "Luxury perfume commercial, black background, gold reflections, cinematic camera movement, premium ad style, elegant atmosphere, 16:9" },
      { name: "Fashion Reel", prompt: "Fashion reel video, stylish model, modern editorial look, smooth motion, high-end commercial style, 9:16" }
    ];

    function renderTemplates() {
      const grid = document.getElementById('templateGrid');
      grid.innerHTML = TEMPLATES.map(t => `<div class="template-card" data-prompt="${t.prompt}"><h4>${t.name}</h4><p class="muted">${t.prompt.slice(0, 90)}...</p></div>`).join('');
      grid.querySelectorAll('.template-card').forEach(card => card.addEventListener('click', () => {
        document.getElementById('prompt').value = card.dataset.prompt;
      }));
      const remixPrompt = localStorage.getItem('remix_prompt');
      if (remixPrompt) {
        document.getElementById('prompt').value = remixPrompt;
        localStorage.removeItem('remix_prompt');
      }
    }

    async function loadSession() {
      const { data } = await supabase.auth.getUser();
      if (!data?.user) { window.location.href = '/login'; return; }
      currentUser = data.user;
      document.getElementById('email').textContent = currentUser.email;
      const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
      currentProfile = profile || { plan: 'free', credits: 0 };
      document.getElementById('plan').textContent = currentProfile.plan || 'free';
      document.getElementById('credits').textContent = currentProfile.credits ?? 0;
      document.getElementById('refCode').textContent = currentProfile.referral_code || '-';
      document.getElementById('refLink').value = `${window.location.origin}/login?ref=${currentProfile.referral_code || ''}`;

      const { data: generations } = await supabase.from('generations').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(12);
      const gallery = document.getElementById('myGallery');
      gallery.innerHTML = (generations || []).map(item => {
        const url = item.result_url || item.image_url || '';
        return (url.endsWith('.mp4') || url.includes('video')) ? `<video controls src="${url}"></video>` : `<img src="${url}" alt="">`;
      }).join('');
    }

    async function deductCredit(amount) {
      await supabase.from('profiles').update({ credits: Math.max((currentProfile.credits || 0) - amount, 0) }).eq('id', currentUser.id);
    }

    async function saveGeneration(tool, prompt, url) {
      await supabase.from('generations').insert({ user_id: currentUser.id, tool, prompt, image_url: url, result_url: url });
    }

    document.getElementById('copyRefBtn').onclick = async () => {
      await navigator.clipboard.writeText(document.getElementById('refLink').value);
      alert('تم نسخ رابط الدعوة');
    };

    document.getElementById('logoutBtn').onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = '/login';
    };

    document.getElementById('enhanceBtn').onclick = async () => {
      const prompt = document.getElementById('prompt').value.trim();
      const r = await fetch('/api/ai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tool: 'enhance-prompt', prompt }) });
      const d = await r.json();
      document.getElementById('output').textContent = d.enhanced || JSON.stringify(d, null, 2);
    };

    document.getElementById('imageBtn').onclick = async () => {
      if ((currentProfile.credits || 0) <= 0) return alert('رصيدك خلص');
      const prompt = document.getElementById('prompt').value.trim();
      const r = await fetch('/api/ai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tool: 'imagen3', prompt }) });
      const d = await r.json();
      document.getElementById('output').textContent = JSON.stringify(d, null, 2);
      const url = d.output && Array.isArray(d.output) ? d.output[0] : null;
      if (url) {
        latestImageUrl = url;
        await saveGeneration('imagen3', prompt, url);
        await deductCredit(1);
        await loadSession();
      }
    };

    document.getElementById('videoBtn').onclick = async () => {
      if ((currentProfile.plan || 'free') === 'free') {
        document.getElementById('upgradePopup').classList.add('show');
        return;
      }
      if (!latestImageUrl) return alert('ولّد صورة أولًا');
      const prompt = document.getElementById('prompt').value.trim();
      const r = await fetch('/api/ai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tool: 'image-to-video', prompt, imageUrl: latestImageUrl }) });
      const d = await r.json();
      document.getElementById('output').textContent = JSON.stringify(d, null, 2);
      if (d.taskId) {
        if (poll) clearInterval(poll);
        poll = setInterval(async () => {
          const s = await fetch('/api/ai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tool: 'video-status', taskId: d.taskId }) });
          const sd = await s.json();
          document.getElementById('output').textContent = JSON.stringify(sd, null, 2);
          if (sd.success && sd.done) {
            clearInterval(poll);
            const videoUrl = sd.output?.[0] || null;
            if (videoUrl) {
              await saveGeneration('image-to-video', prompt, videoUrl);
              await deductCredit(10);
              await loadSession();
            }
          }
        }, 5000);
      }
    };

    renderTemplates();
    await loadSession();
  </script>
</body>
</html>
