
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - SAIDRASHIDY AI</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f0f12;color:#fff;margin:0;padding:24px}
    .wrap{max-width:1100px;margin:0 auto}
    .card{background:#18181d;border:1px solid #2f2f3a;border-radius:16px;padding:20px;margin-bottom:16px}
    .gold{color:#f5c842}.muted{color:#aaa}
    button{padding:12px 16px;border:none;border-radius:10px;cursor:pointer;font-weight:700}
    .primary{background:#f5c842;color:#000}.danger{background:#ef4444;color:#fff}.blue{background:#3b82f6;color:#fff}
    textarea,input{width:100%;min-height:48px;background:#202028;border:1px solid #2f2f3a;color:#fff;border-radius:10px;padding:12px;box-sizing:border-box}
    textarea{min-height:110px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .metric{background:#202028;border:1px solid #2f2f3a;border-radius:12px;padding:14px}
    .out{background:#202028;border:1px solid #2f2f3a;border-radius:12px;padding:12px;margin-top:12px;word-break:break-word}
    .template-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .template-card{background:#202028;border:1px solid #2f2f3a;border-radius:14px;padding:14px;cursor:pointer}
    .template-card:hover{border-color:#f5c842}
    .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
    .gallery img{width:100%;border-radius:12px}
    .upgrade-popup{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:999}
    .upgrade-popup.show{display:flex}
    .upgrade-box{background:#111;border:1px solid #333;border-radius:16px;padding:24px;max-width:320px;text-align:center}
    @media(max-width:900px){.grid,.template-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:560px){.grid,.template-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>لوحة التحكم <span class="gold">SAIDRASHIDY AI</span></h1>
      <div class="grid">
        <div class="metric"><div class="muted">المستخدم</div><strong id="email">...</strong></div>
        <div class="metric"><div class="muted">الخطة</div><strong id="plan">free</strong></div>
        <div class="metric"><div class="muted">الرصيد</div><strong id="credits">0</strong></div>
        <div class="metric"><div class="muted">كود الدعوة</div><strong id="refCode">-</strong></div>
      </div>
      <div class="row" style="margin-top:12px">
        <button class="danger" id="logoutBtn">تسجيل الخروج</button>
        <button class="blue" onclick="location.href='/explore'">Explore</button>
        <button class="primary" onclick="location.href='/admin'">Admin</button>
      </div>
    </div>

    <div class="card">
      <h2>🎬 TikTok / Ads Templates</h2>
      <div class="template-grid" id="templateGrid"></div>
    </div>

    <div class="card">
      <h2>توليد AI</h2>
      <textarea id="prompt" placeholder="اكتب وصف الصورة أو الفيديو"></textarea>
      <div class="row" style="margin-top:10px">
        <button class="primary" id="enhanceBtn">تحسين البرومبت</button>
        <button class="primary" id="imageBtn">توليد صورة</button>
        <button class="primary" id="veoBtn">Veo 3 فيديو</button>
      </div>
      <div class="out" id="output">لا يوجد ناتج بعد</div>
    </div>

    <div class="card">
      <h2>🎁 نظام الدعوات</h2>
      <p>احصل على 20 Credits لكل شخص يسجل من خلالك</p>
      <input id="refLink" readonly>
      <div class="row" style="margin-top:10px">
        <button class="primary" id="copyRefBtn">نسخ رابط الدعوة</button>
      </div>
    </div>

    <div class="card">
      <h2>🖼️ آخر أعمالك</h2>
      <div class="gallery" id="myGallery"></div>
    </div>
  </div>

  <div id="veoPopup" class="upgrade-popup">
    <div class="upgrade-box">
      <h2>🚀 Veo 3 متاح في Pro</h2>
      <p>فعّل باقة Pro للحصول على فيديوهات AI احترافية بدون علامة مائية.</p>
      <button class="primary" onclick="window.location.href='/'">💎 شاهد الباقات</button>
      <button style="margin-top:8px" onclick="closeVeo()">إغلاق</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'PUT_YOUR_SUPABASE_URL_HERE';
    const SUPABASE_ANON_KEY = 'PUT_YOUR_SUPABASE_ANON_KEY_HERE';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentProfile = null;

    const VIDEO_TEMPLATES = [
      { name:"إعلان TikTok", prompt:"A viral TikTok style product ad, fast cuts, cinematic lighting, trendy social media aesthetic, bold product reveal, 9:16" },
      { name:"إعلان عطر فاخر", prompt:"Luxury perfume commercial, black background, gold reflections, cinematic camera movement, premium ad style, elegant atmosphere, 16:9" },
      { name:"Fashion Reel", prompt:"Fashion reel video, stylish model, modern editorial look, smooth motion, high-end commercial style, 9:16" },
      { name:"Food Promo", prompt:"Delicious food commercial, dramatic close-ups, steam, cinematic restaurant lighting, mouth-watering product ad, 9:16" },
      { name:"Car Ad", prompt:"Cinematic sports car ad, night city reflections, dramatic lighting, smooth tracking shots, premium commercial, 16:9" },
      { name:"Hook Video", prompt:"Attention-grabbing social media hook video, bold motion, high contrast, cinematic intro, short-form content style, 9:16" }
    ];

    window.closeVeo = function(){ document.getElementById("veoPopup").classList.remove("show"); }

    function showVeo(){ document.getElementById("veoPopup").classList.add("show"); }

    function renderTemplates(){
      const grid = document.getElementById("templateGrid");
      grid.innerHTML = VIDEO_TEMPLATES.map(t => `
        <div class="template-card" data-prompt="${t.prompt}">
          <h4>${t.name}</h4>
          <p class="muted">${t.prompt.slice(0,90)}...</p>
        </div>
      `).join("");

      grid.querySelectorAll(".template-card").forEach(card => {
        card.addEventListener("click", () => {
          document.getElementById("prompt").value = card.dataset.prompt;
        });
      });
    }

    async function loadSession(){
      const { data } = await supabase.auth.getUser();
      if (!data?.user) {
        window.location.href = '/login';
        return;
      }
      currentUser = data.user;
      document.getElementById('email').textContent = currentUser.email;

      const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
      currentProfile = profile;
      document.getElementById('plan').textContent = profile?.plan || 'free';
      document.getElementById('credits').textContent = profile?.credits ?? 0;
      document.getElementById('refCode').textContent = profile?.referral_code || '-';

      const refLink = `${window.location.origin}/login?ref=${profile?.referral_code || ''}`;
      document.getElementById('refLink').value = refLink;

      const { data: generations } = await supabase.from('generations').select('*').eq('user_id', currentUser.id).order('created_at', { ascending:false }).limit(12);
      const gallery = document.getElementById('myGallery');
      gallery.innerHTML = (generations || []).map(item => `<img src="${item.result_url || item.image_url}" alt="">`).join('');
    }

    document.getElementById('copyRefBtn').addEventListener('click', async () => {
      await navigator.clipboard.writeText(document.getElementById('refLink').value);
      alert('تم نسخ رابط الدعوة 🔥');
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = '/login';
    });

    document.getElementById('enhanceBtn').addEventListener('click', async () => {
      const prompt = document.getElementById('prompt').value.trim();
      const r = await fetch('/api/ai', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ tool:'enhance-prompt', prompt })
      });
      const d = await r.json();
      document.getElementById('output').textContent = d.enhanced || JSON.stringify(d, null, 2);
    });

    document.getElementById('imageBtn').addEventListener('click', async () => {
      if ((currentProfile?.credits ?? 0) <= 0) {
        alert('رصيدك خلص 💰');
        return;
      }

      const prompt = document.getElementById('prompt').value.trim();
      const r = await fetch('/api/ai', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ tool:'imagen3', prompt })
      });
      const d = await r.json();

      document.getElementById('output').textContent = JSON.stringify(d, null, 2);

      if (d.type === 'base64') {
        const imageUrl = `data:${d.mimeType || 'image/png'};base64,${d.data}`;
        await supabase.from('generations').insert({
          user_id: currentUser.id,
          prompt,
          image_url: imageUrl,
          result_url: imageUrl
        });

        await supabase.from('profiles').update({
          credits: Math.max((currentProfile.credits || 0) - 1, 0)
        }).eq('id', currentUser.id);

        await loadSession();
      }
    });

    document.getElementById('veoBtn').addEventListener('click', async () => {
      if ((currentProfile?.plan || 'free') === 'free') {
        showVeo();
        return;
      }
      const prompt = document.getElementById('prompt').value.trim();
      const r = await fetch('/api/ai', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ tool:'veo3', prompt, aspectRatio:'9:16', durationSeconds:8 })
      });
      const d = await r.json();
      document.getElementById('output').textContent = JSON.stringify(d, null, 2);
    });

    renderTemplates();
    await loadSession();
  </script>
</body>
</html>
