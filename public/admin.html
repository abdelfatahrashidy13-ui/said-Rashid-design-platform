<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
</head>
<body>
  <h1>Admin Dashboard</h1>
  <div id="data"></div>

  <script>
    fetch('/api/admin-stats')
      .then(r => r.json())
      .then(d => {
        document.getElementById('data').innerText = JSON.stringify(d, null, 2);
      });
  </script>
</body>
</html>
