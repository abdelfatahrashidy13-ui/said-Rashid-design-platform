<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Said Rashid Design Platform V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* التنسيقات والألوان الفخمة */
        :root {
            --bg: #0a0a0a; --card: #1a1a1a; --border: #2a2a2a;
            --gold: #f5c842; --txt: #fff; --txt2: #888;
            --grad: linear-gradient(135deg, #f5c842, #e8a020);
            --glow: 0 0 30px rgba(245, 200, 66, .2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Cairo, sans-serif; background: var(--bg); color: var(--txt); overflow-x: hidden; }
        
        /* Sidebar */
        .sb { position: fixed; right: 0; top: 0; width: 60px; height: 100vh; background: #0d0d0d; border-left: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 15px 0; z-index: 200; }
        .sb-logo { width: 40px; height: 40px; background: var(--grad); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; margin-bottom: 20px; cursor: pointer; }
        .sb-ic { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: 0.2s; color: var(--txt2); margin-bottom: 10px; }
        .sb-ic:hover, .sb-ic.on { background: var(--card); color: var(--gold); }
        
        .main { margin-right: 60px; }
        
        /* Header */
        .hdr { position: sticky; top: 0; z-index: 100; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .hdr-brand { font-weight: 900; display: flex; align-items: center; gap: 10px; }
        .dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; }
        .btn-free { background: var(--grad); color: #000; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 800; cursor: pointer; }

        /* Content */
        .content { padding: 20px; padding-bottom: 120px; }
        .page { display: none; }
        .page.on { display: block; }
        
        /* Grid for Tools */
        .dz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .dz-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; cursor: pointer; text-align: center; transition: 0.3s; }
        .dz-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .dc-ic { font-size: 30px; margin-bottom: 10px; display: block; }
        .dc-nm { font-weight: 700; font-size: 13px; }

        /* Status Bar (Bottom) */
        .stbar { position: fixed; bottom: 0; left: 0; right: 60px; background: #0d0d0d; border-top: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .stbar-top { display: flex; gap: 10px; align-items: center; }
        .st-inp { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; font-family: Cairo; outline: none; }
        .btn-run { background: var(--grad); color: #000; border: none; border-radius: 10px; padding: 10px 25px; font-weight: 900; cursor: pointer; }
        
        /* Result Box */
        .res-box { display: none; margin-top: 15px; text-align: center; }
        .res-box.show { display: block; }
