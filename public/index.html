<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Said Rashid Design Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#161616;
  --card:#1a1a1a;--card2:#202020;--card3:#252525;
  --border:#2a2a2a;--border2:#333;
  --gold:#f5c842;--gold2:#e8a020;
  --blue:#3b82f6;--purple:#8b5cf6;--green:#22c55e;
  --red:#ef4444;--cyan:#06b6d4;--orange:#f97316;
  --txt:#fff;--txt2:#888;--muted:#555;
  --grad:linear-gradient(135deg,#f5c842,#e8a020);
  --glow:0 0 30px rgba(245,200,66,.2);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:"Cairo",sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden}

/* SIDEBAR */
.sb{position:fixed;right:0;top:0;width:60px;height:100vh;background:#0d0d0d;border-left:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:2px;z-index:200}
.sb-logo{width:38px;height:38px;background:var(--grad);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#000;margin-bottom:10px;cursor:pointer;box-shadow:var(--glow)}
.sb-av{width:34px;height:34px;border-radius:50%;overflow:hidden;margin-bottom:8px;cursor:pointer;border:2px solid var(--border)}
.sb-av img{width:100%;height:100%;object-fit:cover}
.sb-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .2s;color:var(--txt2);position:relative}
.sb-ic:hover,.sb-ic.on{background:var(--card);color:var(--gold)}
.sb-ic .tt{position:absolute;right:46px;background:#222;border:1px solid var(--border);color:var(--txt);font-size:10px;padding:4px 9px;border-radius:7px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s}
.sb-ic:hover .tt{opacity:1}
.sb-bot{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:2px}
.sb-div{width:30px;height:1px;background:var(--border);margin:6px 0}

/* MAIN */
.main{margin-right:60px;min-height:100vh}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;height:58px;display:flex;align-items:center;gap:14px;padding:0 24px;background:rgba(10,10,10,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.hdr-brand{font-size:15px;font-weight:800;white-space:nowrap;display:flex;align-items:center;gap:8px}
.hdr-brand .dot{width:8px;height:8px;background:var(--gold);border-radius:50%;box-shadow:var(--glow)}
.hdr-search{flex:1;max-width:320px;position:relative}
.hdr-search input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px 8px 34px;color:var(--txt);font-family:"Cairo",sans-serif;font-size:12px;outline:none;transition:border-color .2s}
.hdr-search input:focus{border-color:var(--gold)}
.hdr-search input::placeholder{color:var(--muted)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px}
.hdr-r{display:flex;gap:9px;align-items:center;margin-right:auto}
.btn-free{background:var(--grad);color:#000;border:none;border-radius:9px;padding:8px 16px;font-family:"Cairo",sans-serif;font-weight:800;font-size:11px;cursor:pointer;transition:all .2s}
.btn-free:hover{transform:translateY(-1px);box-shadow:var(--glow)}
.btn-login{background:transparent;color:var(--txt2);border:1px solid var(--border);border-radius:9px;padding:8px 14px;font-family:"Cairo",sans-serif;font-weight:600;font-size:11px;cursor:pointer;transition:all .2s}
.btn-login:hover{border-color:var(--gold);color:var(--gold)}

/* CONTENT */
.content{padding:20px 20px 110px}
.page{display:none}.page.on{display:block}

/* ── HERO ── */
.hero{text-align:center;padding:50px 20px 40px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(245,200,66,.06),transparent);pointer-events:none}
.hero-lnav{display:flex;gap:20px;justify-content:center;margin-bottom:32px;flex-wrap:wrap}
.hero-lnav a{color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;transition:color .2s}
.hero-lnav a:hover{color:var(--gold)}
.hero h1{font-size:clamp(26px,6vw,54px);font-weight:900;line-height:1.1;margin-bottom:14px}
.hero h1 span{color:var(--gold)}
.hero-sub{color:var(--txt2);font-size:14px;margin-bottom:24px;line-height:1.7}
.btn-hero{background:var(--grad);color:#000;border:none;border-radius:12px;padding:13px 30px;font-family:"Cairo",sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:all .2s;box-shadow:var(--glow)}
.btn-hero:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(245,200,66,.4)}

/* Hero Demo Box */
.hero-demo{max-width:560px;margin:32px auto 0;background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.demo-tabs{display:flex;border-bottom:1px solid var(--border)}
.demo-tab{flex:1;padding:11px 8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--txt2);text-align:center;transition:all .2s;border-bottom:2px solid transparent}
.demo-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.demo-content{padding:20px;min-height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.demo-visual{width:100%;height:160px;border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.demo-label{font-size:11px;color:var(--txt2);margin-top:4px}

/* Trust */
.trust{display:flex;gap:28px;justify-content:center;margin-top:28px;flex-wrap:wrap;opacity:.4}
.trust span{font-size:12px;font-weight:700}

/* ── TOOLS SECTION TITLE ── */
.sec-ttl{font-size:18px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.sec-ttl::before{content:"";width:3px;height:18px;background:var(--grad);border-radius:3px;display:inline-block}

/* ── DZ GRID (2col) ── */
.dz-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px}
.dz-card{background:var(--card);border:1px solid var(--border);border-radius:16px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;padding:14px}
.dz-card:hover{transform:translateY(-4px);border-color:rgba(245,200,66,.35);box-shadow:0 12px 36px rgba(0,0,0,.6)}
.dz-card-top{display:flex;align-items:center;gap:7px;margin-bottom:12px}
.dz-card-top .ic{font-size:14px}
.dz-card-top .nm{font-size:12px;font-weight:700}
.dz-preview{width:100%;height:110px;border-radius:10px;overflow:hidden;position:relative}
.ba-wrap{display:flex;gap:3px;height:100%}
.ba-side{flex:1;border-radius:7px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.ba-lbl{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);color:#fff;font-size:8px;padding:2px 5px;border-radius:4px;font-weight:700}
.ba-arrow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:rgba(255,255,255,.5);z-index:2}
.overlay-txt{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.75);color:#fff;font-size:9px;padding:4px 8px;border-radius:6px;max-width:110px;line-height:1.4;font-weight:600}
.pm-tag{position:absolute;top:10px;right:10px;background:var(--grad);color:#000;font-size:8px;font-weight:800;padding:2px 7px;border-radius:5px}
.new-tag{position:absolute;top:10px;right:10px;background:rgba(34,197,94,.15);border:1px solid var(--green);color:var(--green);font-size:8px;font-weight:800;padding:2px 7px;border-radius:5px}

/* 3-col */
.dz-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.dz-c3{background:var(--card);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.dz-c3:hover{transform:translateY(-3px);border-color:rgba(245,200,66,.25);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.c3-head{display:flex;align-items:center;gap:5px;padding:9px 9px 0}
.c3-head .ic{font-size:13px}
.c3-head .nm{font-size:10px;font-weight:700;line-height:1.3}
.c3-vis{height:80px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:8px}
.c3-ba{display:flex;gap:2px;height:70px;margin:8px}
.c3-ba .s{flex:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative}
.c3-ba .s .lb{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.7);color:#fff;font-size:7px;padding:1px 4px;border-radius:3px;font-weight:700}

/* ── ROW ── */
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.rh-t{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.rh-t::before{content:"";width:3px;height:14px;background:var(--grad);border-radius:3px}
.rh-m{color:var(--gold);font-size:11px;font-weight:600;cursor:pointer}
.hsc{display:flex;gap:10px;overflow-x:auto;padding-bottom:5px;scrollbar-width:none;margin-bottom:24px}
.hsc::-webkit-scrollbar{display:none}
.gc{min-width:150px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;flex-shrink:0}
.gc:hover{transform:translateY(-3px);border-color:var(--gold)}
.gc-t{height:75px;display:flex;align-items:center;justify-content:center;font-size:28px}
.gc-i{padding:8px 10px;font-size:10px;font-weight:600;line-height:1.4;color:var(--txt)}

/* ── ASSETS ── */
.at-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.at{padding:10px 18px;font-size:12px;font-weight:600;cursor:pointer;color:var(--txt2);border-bottom:2px solid transparent;transition:all .2s}
.at.on{color:var(--gold);border-bottom-color:var(--gold)}
.af-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px}
.af{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:all .2s}
.af:hover{border-color:var(--gold)}
.as-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.as-item{aspect-ratio:1;border-radius:9px;overflow:hidden;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:22px}
.as-item:hover{transform:scale(1.05)}

/* ── PROFILE ── */
.prof-wrap{max-width:520px;margin:0 auto;padding:16px 0}
.prof-top{display:flex;align-items:flex-start;gap:18px;margin-bottom:24px}
.prof-av{width:76px;height:76px;border-radius:50%;overflow:hidden;border:3px solid var(--border);flex-shrink:0;position:relative}
.prof-av img{width:100%;height:100%;object-fit:cover}
.prof-edit-btn{position:absolute;bottom:0;right:0;background:var(--gold);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer}
.prof-fields{flex:1;display:flex;flex-direction:column;gap:9px}
.pfl{font-size:9px;color:var(--txt2);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.pfi{width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--txt);font-family:"Cairo",sans-serif;font-size:12px;outline:none}
.pfi:focus{border-color:var(--gold)}
.pf-hint{font-size:9px;color:var(--muted);margin-top:2px}
.plan-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px}
.plan-box-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.plan-nm{font-size:17px;font-weight:800}
.btn-upg{background:var(--grad);color:#000;border:none;border-radius:8px;padding:7px 14px;font-family:"Cairo",sans-serif;font-weight:800;font-size:11px;cursor:pointer}
.plan-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.plan-row:last-of-type{border-bottom:none}
.plan-rl{font-size:11px;color:var(--txt2)}
.plan-rv{font-size:11px;font-weight:700}
.pbar{width:100%;background:var(--card2);border-radius:5px;height:5px;overflow:hidden;margin-top:8px}
.pbar-f{height:100%;background:var(--grad);border-radius:5px}
.btn-trial{width:100%;background:var(--grad);color:#000;border:none;border-radius:9px;padding:10px;font-family:"Cairo",sans-serif;font-weight:800;font-size:12px;cursor:pointer;margin-top:12px}
.prof-btns{display:flex;justify-content:space-between;align-items:center;padding-top:8px}
.btn-save{background:var(--grad);color:#000;border:none;border-radius:9px;padding:10px 24px;font-family:"Cairo",sans-serif;font-weight:800;font-size:12px;cursor:pointer}
.btn-del{background:transparent;color:var(--red);border:none;font-family:"Cairo",sans-serif;font-size:11px;cursor:pointer;text-decoration:underline}

/* ── PLANS ── */
.plans-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:13px;max-width:780px}
.pc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;position:relative;transition:all .3s}
.pc:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.pc.pop{border-color:var(--gold);box-shadow:var(--glow)}
.pop-t{position:absolute;top:14px;left:14px;background:var(--grad);color:#000;font-size:8px;font-weight:800;padding:3px 8px;border-radius:14px}
.pc .pi{font-size:26px;margin-bottom:10px}
.pc .pn{font-size:15px;font-weight:800;margin-bottom:4px}
.pc .pd{font-size:10px;color:var(--txt2);margin-bottom:14px;line-height:1.5}
.pc .pp .am{font-size:32px;font-weight:900;color:var(--gold)}
.pc .pp .cu{font-size:11px;color:var(--txt2)}
.pc .pp .pe{font-size:10px;color:var(--muted)}
.pc .pp{margin-bottom:14px}
.pc ul{list-style:none;margin-bottom:16px;display:flex;flex-direction:column;gap:7px}
.pc ul li{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--txt2)}
.pc ul li::before{content:"✓";width:16px;height:16px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--green);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0}
.pc ul li.no::before{content:"✗";background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:var(--red)}
.pc .pb{width:100%;border:none;border-radius:9px;padding:10px;font-family:"Cairo",sans-serif;font-weight:800;font-size:12px;cursor:pointer;transition:all .2s}
.pbg{background:var(--grad);color:#000}.pbg:hover{box-shadow:var(--glow)}
.pbo{background:transparent;color:var(--txt);border:1px solid var(--border)}.pbo:hover{border-color:var(--gold);color:var(--gold)}

/* ── PAY ── */
.pay-g{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:680px}
.pay-c{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:20px;transition:all .3s}
.pay-c:hover{transform:translateY(-3px)}
.pay-c.voda{border-color:rgba(239,68,68,.2)}
.pay-c.insta{border-color:rgba(59,130,246,.2)}
.pay-h{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.plogo{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.pvl{background:linear-gradient(135deg,#ef4444,#dc2626)}
.pil{background:linear-gradient(135deg,#3b82f6,#8b5cf6)}
.ptitle{font-size:13px;font-weight:800}
.psub{font-size:10px;color:var(--txt2)}
.nb{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:7px}
.nl{font-size:9px;color:var(--txt2);margin-bottom:2px}
.nv{font-size:13px;font-weight:800;direction:ltr;text-align:left}
.cpb{background:var(--border);border:none;border-radius:6px;padding:5px 10px;color:var(--txt2);font-family:"Cairo",sans-serif;font-size:10px;cursor:pointer;transition:all .2s;white-space:nowrap}
.cpb:hover{background:var(--gold);color:#000}
.qr-img{width:115px;height:115px;border-radius:10px;background:#fff;padding:6px;display:block;margin:9px auto;object-fit:contain}
.stps h5{font-size:9px;font-weight:700;color:var(--txt2);margin-bottom:7px;text-transform:uppercase;letter-spacing:1px}
.step{display:flex;gap:7px;margin-bottom:6px}
.sn{width:17px;height:17px;border-radius:4px;background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.2);color:var(--gold);font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step p{font-size:10px;color:var(--txt2);line-height:1.5}
.notice{max-width:680px;background:rgba(245,200,66,.04);border:1px solid rgba(245,200,66,.14);border-radius:10px;padding:12px 15px;display:flex;gap:8px;margin-top:14px}
.notice p{font-size:11px;color:var(--txt2);line-height:1.7}

/* ── STUDIO BAR ── */
.stbar{position:fixed;bottom:0;left:60px;right:0;z-index:150;background:rgba(10,10,10,.98);border-top:1px solid var(--border);backdrop-filter:blur(24px)}
.stbar-top{display:flex;align-items:center;gap:10px;padding:10px 18px}
.tool-badge{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:5px 11px;font-size:10px;color:var(--txt2);display:flex;align-items:center;gap:5px;white-space:nowrap}
.tool-badge b{color:var(--gold)}
.st-inp{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--txt);font-family:"Cairo",sans-serif;font-size:12px;outline:none;transition:border-color .2s}
.st-inp:focus{border-color:var(--gold)}
.st-inp::placeholder{color:var(--muted)}
.btn-enh{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.2);color:var(--gold);border-radius:8px;padding:8px 12px;font-family:"Cairo",sans-serif;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}
.btn-enh:hover{background:rgba(245,200,66,.15)}
.btn-run{background:var(--grad);color:#000;border:none;border-radius:10px;padding:10px 20px;font-family:"Cairo",sans-serif;font-weight:800;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:all .2s}
.btn-run:hover{transform:translateY(-1px);box-shadow:var(--glow)}
.btn-run:disabled{opacity:.5;cursor:not-allowed;transform:none}
.stbar-body{display:none;padding:0 18px 13px;flex-direction:column;gap:10px}
.stbar.exp .stbar-body{display:flex}
.upz{background:var(--card);border:2px dashed var(--border);border-radius:11px;padding:16px;text-align:center;cursor:pointer;transition:all .2s}
.upz:hover{border-color:var(--purple)}
.upz p{font-size:10px;color:var(--txt2);margin-top:5px}
.prevb{display:none;position:relative}
.prevb img{width:100%;max-height:150px;object-fit:contain;border-radius:9px;background:var(--card2)}
.prevb .rm{position:absolute;top:6px;left:6px;background:rgba(239,68,68,.8);border:none;border-radius:5px;width:22px;height:22px;color:#fff;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.prog{width:100%;background:var(--card2);border-radius:5px;height:4px;overflow:hidden;display:none}
.prog.show{display:block}
.prog-f{height:100%;background:var(--grad);border-radius:5px;width:0%;transition:width .4s}
.stat-t{font-size:10px;color:var(--txt2);margin-top:5px;text-align:center;display:none}
.stat-t.show{display:block}
.err-t{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:8px 12px;color:#fca5a5;font-size:10px;display:none;margin-top:7px}
.err-t.show{display:block}
.res-box{display:none}
.res-box.show{display:block}
.res-img{width:100%;border-radius:10px;max-height:260px;object-fit:contain;background:var(--card2)}
.res-vid{width:100%;border-radius:10px;max-height:260px}
.res-acts{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.res-btn{display:inline-flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:6px 11px;color:var(--txt2);font-family:"Cairo",sans-serif;font-size:10px;cursor:pointer;transition:all .2s;text-decoration:none}
.res-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.ov.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:26px;max-width:360px;width:100%;position:relative;animation:fu .3s both}
.mc{position:absolute;top:10px;left:10px;background:var(--card2);border:none;border-radius:6px;width:26px;height:26px;color:var(--txt2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal h3{font-size:16px;font-weight:800;margin-bottom:5px;text-align:center}
.msub-t{font-size:11px;color:var(--txt2);text-align:center;margin-bottom:14px;line-height:1.7}
.mf{display:flex;flex-direction:column;gap:8px}
.mi{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--txt);font-family:"Cairo",sans-serif;font-size:11px;outline:none;transition:border-color .2s}
.mi:focus{border-color:var(--gold)}
.mi::placeholder{color:var(--muted)}
.mplan{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 12px}
.mpl{font-size:9px;color:var(--txt2);margin-bottom:2px}
.mpv{font-size:13px;font-weight:800;color:var(--gold)}
.msub-btn{background:var(--grad);color:#000;border:none;border-radius:9px;padding:11px;font-family:"Cairo",sans-serif;font-weight:800;font-size:12px;cursor:pointer;transition:all .2s}
.msub-btn:hover{box-shadow:var(--glow)}

footer{background:#0d0d0d;border-top:1px solid var(--border);padding:24px;text-align:center}
.toast{position:fixed;bottom:82px;right:14px;background:var(--green);color:#000;padding:8px 14px;border-radius:9px;font-weight:700;font-size:11px;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:13px;height:13px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite}

@media(max-width:580px){
  .sb{width:48px}.main{margin-right:48px}.stbar{left:48px}
  .hdr{padding:0 11px}.content{padding:14px 12px 105px}
  .dz-grid{grid-template-columns:1fr}.dz-grid3{grid-template-columns:repeat(2,1fr)}
  .as-grid{grid-template-columns:repeat(4,1fr)}
  .pay-g{grid-template-columns:1fr}.plans-g{grid-template-columns:1fr}
  .hero-lnav{gap:12px}
}
</style>
