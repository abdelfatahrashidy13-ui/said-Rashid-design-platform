<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استوديو سعيد رشيدي V3 - المنصة الشاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --card: #1a1a1a; --border: #2a2a2a;
            --gold: #f5c842; --txt: #fff; --txt2: #888;
            --grad: linear-gradient(135deg, #f5c842, #e8a020);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Cairo, sans-serif; background: var(--bg); color: var(--txt); overflow-x: hidden; }
        
        /* Sidebar */
        .sb { position: fixed; right: 0; top: 0; width: 60px; height: 100vh; background: #0d0d0d; border-left: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 15px 0; z-index: 200; }
        .sb-logo { width: 40px; height: 40px; background: var(--grad); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; margin-bottom: 20px; cursor: pointer; }
        .sb-ic { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: 0.2s; color: var(--txt2); margin-bottom: 10px; }
        .sb-ic.on { background: var(--card); color: var(--gold); }
        
        .main { margin-right: 60px; }
        .hdr { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .hdr-brand { font-weight: 900; font-size: 18px; color: var(--gold); }

        .content { padding: 20px; padding-bottom: 180px; }
        .page { display: none; }
        .page.on { display: block; }

        /* Tools Grid */
        .dz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 20px; }
        .dz-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; cursor: pointer; text-align: center; transition: 0.3s; }
        .dz-card:hover, .dz-card.active { border-color: var(--gold); transform: translateY(-3px); background: #222; }
        .dc-ic { font-size: 28px; margin-bottom: 8px; display: block; }
        .dc-nm { font-weight: 700; font-size: 12px; color: var(--txt); }

        /* Input Area */
        .stbar { position: fixed; bottom: 0; left: 0; right: 60px; background: #0d0d0d; border-top: 1px solid var(--border); padding: 15px; z-index: 150; }
        .stbar-top { display: flex; gap: 10px; align-items: center; }
        .st-inp { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; font-family: Cairo; outline: none; }
        .btn-run { background: var(--grad); color: #000; border: none; border-radius: 10px; padding: 10px 20px; font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        /* Result */
        .res-box { display: none; margin-top: 15px; text-align: center; background: #000; padding: 10px; border-radius: 10px; }
        .res-box.show { display: block; }
        .res-img { max-width: 100%; border-radius: 8px; max-height: 250px; }

        .toast { position: fixed; bottom: 180px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 8px 16px; border-radius: 8px; font-weight: 700; display: none; z-index: 1000; }
        .spin { width: 16px; height: 16px; border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) { .stbar { right: 0; } .main { margin-right: 0; } .sb { display: none; } }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<aside class="sb">
    <div class="sb-logo" onclick="showPage('home')">SR</div>
    <div class="sb-ic on" data-page="home">🏠</div>
    <div class="sb-ic" data-page="plans">👑</div>
    <div class="sb-ic" data-page="payment">💰</div>
</aside>

<main class="main">
    <header class="hdr">
        <div class="hdr-brand">استوديو سعيد رشيدي V3</div>
        <button style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 10px; border-radius:5px; font-size:12px;">رصيد: $300</button>
    </header>

    <div class="content">
        <div class="page on" id="page-home">
            <h2 style="font-size: 18px;">مرحباً يا عميد، اختر الأداة:</h2>
            
            <div class="dz-grid">
                <div class="dz-card" onclick="selectTool('veo-3', 'Veo 3 (فيديو)')">
                    <span class="dc-ic">🎬</span><span class="dc-nm">Veo 3 (فيديو)</span>
                </div>
                <div class="dz-card" onclick="selectTool('text-to-video', 'نص إلى فيديو')">
                    <span class="dc-ic">🎥</span><span class="dc-nm">Text to Video</span>
                </div>
                <div class="dz-card" onclick="selectTool('image-to-video', 'صورة إلى فيديو')">
                    <span class="dc-ic">🎞️</span><span class="dc-nm">Image to Video</span>
                </div>

                <div class="dz-card" onclick="selectTool('imagen-3', 'Imagen 3 (صور)')">
                    <span class="dc-ic">🎨</span><span class="dc-nm">Imagen 3 (صور)</span>
                </div>
                <div class="dz-card" onclick="selectTool('face-swap', 'تبديل وجوه')">
                    <span class="dc-ic">🎭</span><span class="dc-nm">Face Swap</span>
                </div>
                <div class="dz-card" onclick="selectTool('remove-bg', 'إزالة خلفية')">
                    <span class="dc-ic">✂️</span><span class="dc-nm">إزالة خلفية</span>
                </div>
                <div class="dz-card" onclick="selectTool('upscale', 'تكبير الصور')">
                    <span class="dc-ic">⬆️</span><span class="dc-nm">Super Scale</span>
                </div>
                <div class="dz-card" onclick="selectTool('ai-expand', 'توسيع الصورة')">
                    <span class="dc-ic">↔️</span><span class="dc-nm">AI Expand</span>
                </div>
            </div>
        </div>

        <div class="page" id="page-plans">
            <h2 style="text-align:center;">باقات الاشتراك 👑</h2>
            <div style="background:var(--card); padding:20px; border-radius:15px; margin-top:20px; text-align:center; border:1px solid var(--gold);">
                <h3>باقة العميد PRO</h3>
                <p style="font-size:30px; font-weight:900; margin:10px 0;">249 EGP</p>
                <button style="width:100%; padding:10px; background:var(--grad); border:none; border-radius:8px; font-weight:bold;" onclick="window.open('https://wa.me/201122977222')">اشترك الآن</button>
            </div>
        </div>
    </div>

    <div class="stbar">
        <div id="toolNm" style="font-size:11px; color:var(--gold); margin-bottom:5px;">اختر أداة لبدء العمل</div>
        <div class="stbar-top">
            <input class="st-inp" id="mainP" type="text" placeholder="اكتب ما تريد توليده...">
            <button class="btn-run" id="runBtn" onclick="runTool()">
                <span id="runTxt">تنفيذ</span>
                <div class="spin" id="runSpin"></div>
            </button>
        </div>
        <div class="res-box" id="resBox">
            <img id="resImg" class="res-img" src="">
            <br>
            <a id="dlBtn" style="color:var(--gold); font-size:12px; text-decoration:none;" download="said-rashidi-output.png">⬇️ حفظ النتيجة</a>
        </div>
    </div>
</main>

<script>
    let curTool = '';

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
        document.getElementById('page-' + id).classList.add('on');
        document.querySelectorAll('.sb-ic').forEach(i => i.classList.remove('on'));
        const activeIc = document.querySelector(`[data-page="${id}"]`);
        if(activeIc) activeIc.classList.add('on');
    }

    function selectTool(id, name) {
        curTool = id;
        document.getElementById('toolNm').textContent = 'الأداة النشطة: ' + name;
        document.querySelectorAll('.dz-card').forEach(c => c.classList.remove('active'));
        event.currentTarget.classList.add('active');
        toast("جاهز لـ " + name);
    }

    async function runTool() {
        const prompt = document.getElementById('mainP').value.trim();
        if (!curTool) { toast("اختر أداة أولاً!"); return; }
        if (!prompt) { toast("أدخل الوصف أولاً!"); return; }

        setLoading(true);
        try {
            const res = await fetch('/api/ai', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tool: curTool, prompt: prompt })
            });
            const d = await res.json();
            if (d.success) {
                const img = document.getElementById('resImg');
                img.src = "data:image/png;base64," + d.data;
                document.getElementById('resBox').classList.add('show');
                document.getElementById('dlBtn').href = img.src;
                toast("✅ تم بنجاح!");
            } else { alert("خطأ من جوجل: " + d.error); }
        } catch (e) { alert("فشل الاتصال"); }
        finally { setLoading(false); }
    }

    function setLoading(v) {
        document.getElementById('runBtn').disabled = v;
        document.getElementById('runTxt').style.display = v ? 'none' : 'inline';
        document.getElementById('runSpin').style.display = v ? 'inline-block' : 'none';
    }

    function toast(m) {
        const t = document.getElementById('toast');
        t.textContent = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    document.querySelectorAll('.sb-ic').forEach(icon => {
        icon.addEventListener('click', () => showPage(icon.dataset.page));
    });
</script>
</body>
</html>
